<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Account Verified - My Lab</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background-color: #f4f7f6; }
        .card { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; max-width: 350px; }
        .icon { font-size: 50px; margin-bottom: 20px; }
        h1 { color: #2ecc71; margin-bottom: 10px; font-size: 24px; }
        p { color: #666; line-height: 1.5; font-size: 16px; }
        .brand { font-weight: bold; color: #3498db; }
    </style>
</head>
<body>
    <div class="card">
        <div class="icon">✅</div>
        <h1>Success!</h1>
        <p>Your account has been successfully verified.</p>
        <p>Thank you for joining <span class="brand">My Lab</span>. You can now return to the app and sign in.</p>
    </div>
</body>
</html>
