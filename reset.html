<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Lab - Reset Password</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 8px 24px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; }
        h2 { color: #1a73e8; margin-bottom: 10px; }
        p { color: #5f6368; font-size: 14px; margin-bottom: 20px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #dadce0; border-radius: 6px; box-sizing: border-box; font-size: 16px; }
        button { width: 100%; padding: 12px; background-color: #1a73e8; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 16px; font-weight: bold; transition: background 0.3s; }
        button:hover { background-color: #1557b0; }
        button:disabled { background-color: #ccc; cursor: not-allowed; }
        #message { margin-top: 20px; font-size: 14px; font-weight: bold; }
        .loader { border: 3px solid #f3f3f3; border-top: 3px solid #1a73e8; border-radius: 50%; width: 20px; height: 20px; animation: spin 1s linear infinite; display: none; margin: 10px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="card">
    <h2>My Lab</h2>
    <p>Please enter your new password below.</p>
    
    <input type="password" id="newPassword" placeholder="New Password" required>
    <button id="submitBtn" onclick="handlePasswordUpdate()">Update Password</button>
    
    <div id="loader" class="loader"></div>
    <div id="message"></div>
</div>

<script>
    async function handlePasswordUpdate() {
        const passwordField = document.getElementById('newPassword');
        const password = passwordField.value;
        const messageDiv = document.getElementById('message');
        const loader = document.getElementById('loader');
        const btn = document.getElementById('submitBtn');

        // 1. Basic validation
        if (password.length < 6) {
            messageDiv.style.color = "#d93025";
            messageDiv.innerText = "Password must be at least 6 characters long.";
            return;
        }

        // 2. Extract JWT Token from URL fragment (#access_token=...)
        const hash = window.location.hash.substring(1);
        const params = new URLSearchParams(hash);
        const accessToken = params.get('access_token');

        if (!accessToken) {
            messageDiv.style.color = "#d93025";
            messageDiv.innerText = "Error: Invalid or expired link. Please request a new one from the app.";
            return;
        }

        // Show loader and disable button
        loader.style.display = "block";
        btn.disabled = true;
        messageDiv.innerText = "";

        try {
            // 3. Send update request to Supabase
            const response = await fetch('https://kdielzqdpobisvmbyqod.supabase.co/auth/v1/user', {
                method: 'PUT',
                headers: {
                    'Content-Type': 'application/json',
                    'apikey': 'sb_publishable_aYmQQFkiAuMXSF_Dl2C25g_tDvOJ5-p',
                    'Authorization': `Bearer ${accessToken}`
                },
                body: JSON.stringify({ password: password })
            });

            const data = await response.json();

            if (response.ok) {
                messageDiv.style.color = "#188038";
                messageDiv.innerText = "Success! Your password has been updated. You can now log in through the app.";
                passwordField.value = "";
            } else {
                messageDiv.style.color = "#d93025";
                messageDiv.innerText = "Update failed: " + (data.msg || "Link has expired.");
            }
        } catch (error) {
            messageDiv.style.color = "#d93025";
            messageDiv.innerText = "Error: Could not connect to the server.";
        } finally {
            loader.style.display = "none";
            btn.disabled = false;
        }
    }
</script>

</body>
</html>
