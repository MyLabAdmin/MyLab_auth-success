<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Lab - Reset Password</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; }
        h2 { color: #03A9F4; margin-bottom: 20px; }
        p { color: #666; font-size: 14px; margin-bottom: 25px; }
        input { width: 100%; padding: 12px; margin-bottom: 20px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; font-size: 16px; outline: none; }
        input:focus { border-color: #03A9F4; }
        button { width: 100%; padding: 12px; background-color: #03A9F4; border: none; border-radius: 6px; color: white; font-size: 16px; cursor: pointer; transition: background 0.3s; font-weight: bold; }
        button:hover { background-color: #0288D1; }
        #message { margin-top: 20px; font-size: 14px; font-weight: bold; line-height: 1.5; }
    </style>
</head>
<body>

<div class="container">
    <h2>My Lab</h2>
    <p>Please enter your new password below to reset your account access.</p>
    
    <input type="password" id="newPassword" placeholder="Enter new password" required>
    <button onclick="updatePassword()">Update Password</button>
    
    <div id="message"></div>
</div>

<script>
    async function updatePassword() {
        const password = document.getElementById('newPassword').value;
        const messageDiv = document.getElementById('message');
        
        // 1. استخراج التوكن من الرابط بشكل احترافي
        // نتعامل مع الـ Hash وننظفه من أي علامات زائدة قد يضيفها البريد الإلكتروني
        const hash = window.location.hash.substring(1);
        const params = new URLSearchParams(hash);
        const accessToken = params.get('access_token');

        if (!accessToken) {
            messageDiv.style.color = "red";
            messageDiv.innerText = "Error: Invalid or expired link. Please request a new password reset from the app.";
            return;
        }

        if (password.length < 6) {
            messageDiv.style.color = "red";
            messageDiv.innerText = "Password must be at least 6 characters.";
            return;
        }

        messageDiv.style.color = "#03A9F4";
        messageDiv.innerText = "Updating...";

        try {
            // 2. إرسال طلب التحديث إلى Supabase
            const response = await fetch('https://kdielzqdpobisvmbyqod.supabase.co/auth/v1/user', {
                method: 'PUT',
                headers: {
                    'Content-Type': 'application/json',
                    'apikey': 'sb_publishable_aYmQQFkiAuMXSF_Dl2C25g_tDvOJ5-p',
                    'Authorization': `Bearer ${accessToken}`
                },
                body: JSON.stringify({ password: password })
            });

            const data = await response.json();

            if (response.ok) {
                messageDiv.style.color = "green";
                messageDiv.innerText = "Success! Your password has been updated. You can now close this page and log in to My Lab.";
            } else {
                messageDiv.style.color = "red";
                // عرض رسالة الخطأ القادمة من Supabase مباشرة
                messageDiv.innerText = "Error: " + (data.msg || data.error_description || "Update failed");
            }
        } catch (error) {
            messageDiv.style.color = "red";
            messageDiv.innerText = "Network error. Please try again.";
        }
    }
</script>

</body>
</html>
