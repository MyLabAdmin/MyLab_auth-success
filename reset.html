<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Lab - Reset Password</title>
    <style>
        body { font-family: sans-serif; background-color: #f4f7f6; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: white; padding: 2rem; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 100%; max-width: 350px; text-align: center; }
        input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background: #03A9F4; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        #msg { margin-top: 15px; font-weight: bold; font-size: 14px; }
    </style>
</head>
<body>
    <div class="card">
        <h2>My Lab</h2>
        <p>Set your new password</p>
        <input type="password" id="pass" placeholder="New Password">
        <button onclick="save()">Update Password</button>
        <div id="msg"></div>
    </div>

    <script>
        async function save() {
            const password = document.getElementById('pass').value;
            const msg = document.getElementById('msg');
            
            // 1. التقاط التوكن الطويل (JWT) من الرابط بعد علامة الهاش #
            const hash = window.location.hash.substring(1);
            const params = new URLSearchParams(hash);
            const token = params.get('access_token');

            if (!token) {
                msg.style.color = "red";
                msg.innerText = "Error: Invalid link or missing token.";
                return;
            }

            msg.style.color = "#03A9F4";
            msg.innerText = "Updating...";

            // 2. إرسال التحديث لـ Supabase
            try {
                const res = await fetch('https://kdielzqdpobisvmbyqod.supabase.co/auth/v1/user', {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'apikey': 'sb_publishable_aYmQQFkiAuMXSF_Dl2C25g_tDvOJ5-p',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ password: password })
                });

                if (res.ok) {
                    msg.style.color = "green";
                    msg.innerText = "Success! Password updated.";
                } else {
                    const data = await res.json();
                    msg.style.color = "red";
                    msg.innerText = "Error: " + (data.msg || "Failed to update.");
                }
            } catch (e) {
                msg.innerText = "Network Error.";
            }
        }
    </script>
</body>
</html>
