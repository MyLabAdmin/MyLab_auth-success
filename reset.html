<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Lab - Reset Password</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; }
        h2 { color: #333; margin-bottom: 20px; }
        p { color: #666; font-size: 14px; margin-bottom: 25px; }
        input { width: 100%; padding: 12px; margin-bottom: 20px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; font-size: 16px; }
        button { width: 100%; padding: 12px; background-color: #03A9F4; border: none; border-radius: 6px; color: white; font-size: 16px; cursor: pointer; transition: background 0.3s; }
        button:hover { background-color: #03A9F4; }
        #message { margin-top: 20px; font-size: 14px; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h2>My Lab</h2>
    <p>Please enter your new password below to reset your account access.</p>
    
    <input type="password" id="newPassword" placeholder="Enter new password" required>
    <button onclick="updatePassword()">Update Password</button>
    
    <div id="message"></div>
</div>

<script>
    async function updatePassword() {
        const password = document.getElementById('newPassword').value;
        const messageDiv = document.getElementById('message');
        
        // 1. Get the access token from the URL hash
        const hash = window.location.hash.substring(1);
        const params = new URLSearchParams(hash);
        const accessToken = params.get('access_token');

        if (!accessToken) {
            messageDiv.style.color = "red";
            messageDiv.innerText = "Error: Invalid or expired session link.";
            return;
        }

        if (password.length < 6) {
            messageDiv.style.color = "red";
            messageDiv.innerText = "Password must be at least 6 characters.";
            return;
        }

        messageDiv.style.color = "blue";
        messageDiv.innerText = "Updating...";

        // 2. Call Supabase API to update password
        try {
            const response = await fetch('https://kdielzqdpobisvmbyqod.supabase.co/auth/v1/user', {
                method: 'PUT',
                headers: {
                    'Content-Type': 'application/json',
                    'apikey': 'sb_publishable_aYmQQFkiAuMXSF_Dl2C25g_tDvOJ5-p', // Replace with your actual Anon Key
                    'Authorization': `Bearer ${accessToken}`
                },
                body: JSON.stringify({ password: password })
            });

            if (response.ok) {
                messageDiv.style.color = "green";
                messageDiv.innerText = "Success! Your password has been updated. You can now return to the app and log in.";
            } else {
                const errorData = await response.json();
                messageDiv.style.color = "red";
                messageDiv.innerText = "Error: " + errorData.msg;
            }
        } catch (error) {
            messageDiv.style.color = "red";
            messageDiv.innerText = "Network error. Please try again.";
        }
    }
</script>

</body>
</html>
