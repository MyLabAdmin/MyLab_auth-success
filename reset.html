<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Lab - Reset Password</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 8px 24px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; }
        h2 { color: #1a73e8; margin-bottom: 10px; }
        p { color: #5f6368; font-size: 14px; margin-bottom: 20px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #dadce0; border-radius: 6px; box-sizing: border-box; font-size: 16px; }
        button { width: 100%; padding: 12px; background-color: #1a73e8; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 16px; font-weight: bold; transition: background 0.3s; }
        button:hover { background-color: #1557b0; }
        button:disabled { background-color: #ccc; cursor: not-allowed; }
        #message { margin-top: 20px; font-size: 14px; font-weight: bold; }
        .loader { border: 3px solid #f3f3f3; border-top: 3px solid #1a73e8; border-radius: 50%; width: 20px; height: 20px; animation: spin 1s linear infinite; display: none; margin: 10px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="card">
    <h2>My Lab</h2>
    <p>Enter your new password.</p>
    <input type="password" id="newPassword" placeholder="New Password" required>
    <button id="submitBtn" onclick="handleUpdate()">Update Password</button>
    <div id="loader" class="loader"></div>
    <div id="message"></div>
</div>

<script>
    const API_URL = 'https://kdielzqdpobisvmbyqod.supabase.co/auth/v1';
    const API_KEY = 'sb_publishable_aYmQQFkiAuMXSF_Dl2C25g_tDvOJ5-p';

    async function handleUpdate() {
        const password = document.getElementById('newPassword').value;
        const messageDiv = document.getElementById('message');
        const loader = document.getElementById('loader');
        const btn = document.getElementById('submitBtn');

        if (password.length < 6) {
            messageDiv.style.color = "red";
            messageDiv.innerText = "Password must be at least 6 characters.";
            return;
        }

        const urlParams = new URLSearchParams(window.location.search);
        const tokenHash = urlParams.get('token_hash');

        if (!tokenHash) {
            messageDiv.style.color = "red";
            messageDiv.innerText = "Error: Token missing from URL.";
            return;
        }

        loader.style.display = "block";
        btn.disabled = true;

        try {
            // الخطوة 1: استبدال token_hash بجلسة (Verify)
            const verifyRes = await fetch(`${API_URL}/verify`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'apikey': API_KEY },
                body: JSON.stringify({ token_hash: tokenHash, type: 'recovery' })
            });

            const verifyData = await verifyRes.json();

            if (!verifyRes.ok) throw new Error(verifyData.msg || "Verification failed");

            // الخطوة 2: تحديث كلمة المرور باستخدام التوكن الناتج
            const updateRes = await fetch(`${API_URL}/user`, {
                method: 'PUT',
                headers: {
                    'Content-Type': 'application/json',
                    'apikey': API_KEY,
                    'Authorization': `Bearer ${verifyData.access_token}`
                },
                body: JSON.stringify({ password: password })
            });

            if (updateRes.ok) {
                messageDiv.style.color = "green";
                messageDiv.innerText = "Success! Password updated.";
            } else {
                const updateData = await updateRes.json();
                throw new Error(updateData.msg || "Update failed");
            }
        } catch (err) {
            messageDiv.style.color = "red";
            messageDiv.innerText = err.message;
        } finally {
            loader.style.display = "none";
            btn.disabled = false;
        }
    }
</script>
</body>
</html>
